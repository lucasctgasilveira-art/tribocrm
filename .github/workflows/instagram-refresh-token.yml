name: Instagram Token Refresh

on:
  schedule:
    # Dia 1 de cada mês às 03:00 UTC (= 00:00 BRT). Token IG long-lived dura
    # 60 dias; refresh mensal mantém prazo confortável (~30 dias de folga).
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketing/instagram/package-lock.json

      - name: Install dependencies
        working-directory: marketing/instagram
        run: npm ci --no-audit --no-fund

      - name: Refresh token and rotate secret
        env:
          IG_LONG_LIVED_TOKEN: ${{ secrets.IG_LONG_LIVED_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        working-directory: marketing/instagram
        run: |
          NEW_TOKEN=$(npm run refresh-token --silent -- --ci 2>/dev/null | tail -1)
          if [ -z "$NEW_TOKEN" ]; then
            echo "::error::refresh-token retornou vazio"
            exit 1
          fi
          echo "::add-mask::$NEW_TOKEN"
          echo "$NEW_TOKEN" | gh secret set IG_LONG_LIVED_TOKEN --repo "${{ github.repository }}"
          echo "✓ Token renovado e secret rotacionado"

      - name: Notify Discord (success)
        if: success() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"🔁 Token IG renovado","description":"Long-lived rotacionado automaticamente. Próxima renovação em ~30 dias.","color":3066993,"footer":{"text":"@tribocrmoficial · auto-refresh"}}]}'

      - name: Notify Discord (failure)
        if: failure() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"⚠️ Falha ao renovar token IG","description":"Renovação automática falhou. Rode `npm run refresh-token` local nos próximos dias antes da expiração.\n\nLogs: https://github.com/${{ github.repository }}/actions/workflows/instagram-refresh-token.yml","color":15158332,"footer":{"text":"@tribocrmoficial · auto-refresh"}}]}'
