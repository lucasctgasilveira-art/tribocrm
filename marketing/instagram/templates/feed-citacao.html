<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TriboCRM · Feed Citação Observacional</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  /*
    REGRA DURA: este template NÃO atribui a pessoa real ou fictícia.
    Usado pra citações observacionais (frases que a marca tipifica) ou
    declarações da própria TriboCRM. Nunca colocar nome, cargo ou empresa
    de cliente — pra isso só com case real e permissão escrita.
  */
  .quote-block {
    position: absolute;
    top: 50%;
    left: var(--canvas-pad);
    right: var(--canvas-pad);
    transform: translateY(-50%);
    max-width: 920px;
  }
  .quote-mark {
    font-family: 'DM Sans', sans-serif;
    font-size: 200px;
    font-weight: var(--w-black);
    color: var(--tribo-orange);
    line-height: 0.5;
    margin-bottom: var(--s-3);
    letter-spacing: -0.05em;
  }
  .quote-text {
    color: var(--tribo-white);
    font-style: italic;
    font-weight: var(--w-medium);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: var(--s-5);
  }
  .quote-fonte {
    font-size: 26px;
    font-weight: var(--w-medium);
    color: var(--tribo-white-dim);
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
    margin-top: var(--s-4);
  }
</style>
</head>
<body>
<div class="preview-stage">

  <div class="canvas canvas--feed" data-format="feed-citacao">

    <div class="quote-block">
      <div class="quote-mark">"</div>
      <p class="quote-text t-h3" data-edit="citacao">
        Pipeline cheio virou medalha de participação.
      </p>
      <div class="quote-fonte" data-edit="fonte">Observação · Comercial brasileiro</div>
    </div>

    <span class="brand-signature" data-edit="handle">@tribocrmoficial</span>
    <img class="brand-symbol" src="../_assets/symbol-d.svg" alt="">

  </div>

</div>
</body>
</html>
