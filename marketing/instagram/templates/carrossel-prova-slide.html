<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TriboCRM · Carrossel Prova · Slide número</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  .prova-eyebrow {
    position: absolute;
    top: var(--canvas-pad);
    left: var(--canvas-pad);
    color: var(--tribo-orange);
  }
  .prova-content {
    position: absolute;
    top: 50%;
    left: var(--canvas-pad);
    right: var(--canvas-pad);
    transform: translateY(-50%);
    max-width: 920px;
  }
  .prova-bignum {
    font-size: 240px;
    font-weight: var(--w-black);
    color: var(--tribo-orange);
    line-height: 0.9;
    letter-spacing: -0.04em;
    margin-bottom: var(--s-3);
  }
  .prova-bignum-label {
    font-size: 56px;
    color: var(--tribo-white);
    font-weight: var(--w-medium);
    margin-left: var(--s-3);
    letter-spacing: -0.01em;
  }
  .prova-context {
    color: var(--tribo-white-soft);
    max-width: 820px;
    margin-top: var(--s-3);
  }
  .prova-context strong {
    color: var(--tribo-white);
    font-weight: var(--w-bold);
  }
</style>
</head>
<body>
<div class="preview-stage">

  <div class="canvas canvas--feed" data-format="carrossel-prova-slide">

    <span class="slide-number" data-edit="slide-number">03 / 06</span>

    <span class="prova-eyebrow t-eyebrow" data-edit="estado">Depois</span>

    <div class="prova-content">
      <div class="prova-bignum">
        <span data-edit="numero">22</span><span class="prova-bignum-label" data-edit="unidade">dias</span>
      </div>
      <p class="prova-context t-body-lg" data-edit="contexto">
        Ciclo de venda médio caiu de <strong>45 dias</strong> pra <strong>22 dias</strong> em 3 meses depois do método.
      </p>
    </div>

    <span class="brand-signature" data-edit="handle">@tribocrmoficial</span>
    <img class="brand-symbol" src="../_assets/symbol-d.svg" alt="">

  </div>

</div>
</body>
</html>
