<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TriboCRM · Carrossel Prova · CTA</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  .cta-content {
    position: absolute;
    top: 50%;
    left: var(--canvas-pad);
    right: var(--canvas-pad);
    transform: translateY(-50%);
    max-width: 920px;
  }
  .cta-title {
    color: #0a0a0a;
    margin-bottom: var(--s-4);
  }
  .cta-sub {
    font-size: 36px;
    font-weight: var(--w-medium);
    color: rgba(0,0,0,.8);
    margin-bottom: var(--s-5);
    line-height: var(--leading-snug);
  }
  .cta-handle {
    font-size: 44px;
    font-weight: var(--w-black);
    color: #0a0a0a;
    letter-spacing: -0.01em;
  }
  .cta-link {
    font-size: 28px;
    font-weight: var(--w-medium);
    color: rgba(0,0,0,.75);
    margin-top: var(--s-1);
  }
</style>
</head>
<body>
<div class="preview-stage">

  <div class="canvas canvas--feed canvas--cta" data-format="carrossel-prova-cta">

    <span class="slide-number" data-edit="slide-number">06 / 06</span>

    <div class="cta-content">
      <h2 class="cta-title t-h2" data-edit="titulo">
        Quer ver isso<br>
        rodando no seu time?
      </h2>

      <p class="cta-sub" data-edit="subtitulo">
        Demo em 15 minutos.<br>
        Sem decoreba, sem enrolação.
      </p>

      <div class="cta-handle" data-edit="handle">@tribocrmoficial</div>
      <div class="cta-link" data-edit="link">Link na bio · tribocrm.com.br/demo</div>
    </div>

    <img class="brand-symbol brand-symbol--sm" src="../_assets/symbol-d.svg" alt="" style="filter: brightness(0); opacity: .7;">

  </div>

</div>
</body>
</html>
