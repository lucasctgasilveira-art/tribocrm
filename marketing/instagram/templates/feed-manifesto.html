<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TriboCRM · Feed Manifesto</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  .manifesto {
    position: absolute;
    top: 50%;
    left: var(--canvas-pad);
    right: var(--canvas-pad);
    transform: translateY(-55%);
    max-width: 920px;
  }
  .manifesto-text {
    line-height: 1.02;
    letter-spacing: -0.03em;
  }
  .manifesto-text + .manifesto-text {
    margin-top: var(--s-4);
  }
</style>
</head>
<body>
<div class="preview-stage">

  <div class="canvas canvas--feed" data-format="feed-manifesto">

    <div class="manifesto">
      <h1 class="manifesto-text t-h1-xl" data-edit="linha-1">Vender de verdade</h1>
      <h1 class="manifesto-text t-h1-xl" data-edit="linha-2">não é talento.</h1>
      <h1 class="manifesto-text t-h1-xl" data-edit="linha-3">É <span class="t-orange">método</span>.</h1>
    </div>

    <span class="brand-signature" data-edit="handle">@tribocrmoficial</span>
    <img class="brand-symbol" src="../_assets/symbol-d.svg" alt="">

  </div>

</div>
</body>
</html>
