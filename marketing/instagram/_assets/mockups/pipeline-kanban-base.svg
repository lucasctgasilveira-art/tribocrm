<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" role="img" aria-label="TriboCRM Pipeline Kanban — visao geral">
  <!-- ===== FUNDO DA JANELA DO PRODUTO ===== -->
  <rect width="1000" height="580" rx="20" fill="#0f0f0f"/>
  <rect x="0" y="0" width="1000" height="50" rx="20" fill="#161616"/>
  <rect x="0" y="30" width="1000" height="20" fill="#161616"/>

  <!-- "Window dots" decorativos topo esquerdo -->
  <circle cx="22" cy="25" r="6" fill="#2a2a2a"/>
  <circle cx="42" cy="25" r="6" fill="#2a2a2a"/>
  <circle cx="62" cy="25" r="6" fill="#2a2a2a"/>

  <!-- Marca do produto no topo -->
  <text x="500" y="32" font-family="DM Sans, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="2">PIPELINE</text>

  <!-- ===== COLUNAS ===== -->
  <!-- Coluna 1: Novos -->
  <g transform="translate(30, 70)">
    <rect width="220" height="490" rx="12" fill="#161616"/>
    <text x="20" y="32" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#f97316" letter-spacing="1">NOVOS</text>
    <text x="200" y="32" font-family="DM Sans, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="end">4</text>
    <!-- Cards -->
    <g transform="translate(15, 52)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 01 — Indústria SP</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 12.400</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 22/05 — call</text>
    </g>
    <g transform="translate(15, 142)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 02 — Comércio MG</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 6.800</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 23/05 — orçamento</text>
    </g>
    <g transform="translate(15, 232)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 03 — Serviços RJ</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 9.200</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 22/05 — visita</text>
    </g>
    <g transform="translate(15, 322)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 04 — Atacado PR</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 18.500</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 24/05 — proposta</text>
    </g>
  </g>

  <!-- Coluna 2: Qualificados -->
  <g transform="translate(270, 70)">
    <rect width="220" height="490" rx="12" fill="#161616"/>
    <text x="20" y="32" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#f97316" letter-spacing="1">QUALIFICADOS</text>
    <text x="200" y="32" font-family="DM Sans, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="end">3</text>
    <g transform="translate(15, 52)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 05 — Logística SC</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 24.000</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 23/05 — diagnóstico</text>
    </g>
    <g transform="translate(15, 142)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 06 — Indústria GO</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 31.500</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 22/05 — call sócio</text>
    </g>
    <g transform="translate(15, 232)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 07 — Comércio BA</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 8.900</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 26/05 — retomar</text>
    </g>
  </g>

  <!-- Coluna 3: Em proposta -->
  <g transform="translate(510, 70)">
    <rect width="220" height="490" rx="12" fill="#161616"/>
    <text x="20" y="32" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#f97316" letter-spacing="1">EM PROPOSTA</text>
    <text x="200" y="32" font-family="DM Sans, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="end">3</text>
    <g transform="translate(15, 52)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 08 — Indústria MG</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 42.000</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 23/05 — assinatura</text>
    </g>
    <!-- Card frio: opacidade baixa -->
    <g transform="translate(15, 142)" opacity="0.42">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 09 — Serviços SP</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 15.300</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)">parado há 18 dias</text>
    </g>
    <g transform="translate(15, 232)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 10 — Atacado RS</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 28.700</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 22/05 — revisar</text>
    </g>
  </g>

  <!-- Coluna 4: Fechando -->
  <g transform="translate(750, 70)">
    <rect width="220" height="490" rx="12" fill="#161616"/>
    <text x="20" y="32" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#f97316" letter-spacing="1">FECHANDO</text>
    <text x="200" y="32" font-family="DM Sans, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="end">2</text>
    <g transform="translate(15, 52)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f" stroke="#f97316" stroke-width="1.5"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 11 — Indústria PR</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 56.000</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 22/05 — fechar</text>
    </g>
    <g transform="translate(15, 142)">
      <rect width="190" height="78" rx="8" fill="#1f1f1f" stroke="#f97316" stroke-width="1.5"/>
      <text x="14" y="24" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Lead 12 — Comércio SP</text>
      <text x="14" y="46" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)">R$ 38.500</text>
      <text x="14" y="64" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="#f97316">prox: 23/05 — contrato</text>
    </g>
    <!-- Totalizador rodapé -->
    <g transform="translate(15, 380)">
      <rect width="190" height="92" rx="8" fill="#0a0a0a" stroke="#f97316" stroke-width="1.5"/>
      <text x="14" y="26" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.55)" letter-spacing="1">TOTAL FUNIL</text>
      <text x="14" y="54" font-family="DM Sans, sans-serif" font-size="20" font-weight="800" fill="#f97316">R$ 291.800</text>
      <text x="14" y="78" font-family="DM Sans, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.55)">12 leads · 4 colunas</text>
    </g>
  </g>
</svg>
