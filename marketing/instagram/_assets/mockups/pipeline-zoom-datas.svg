<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" role="img" aria-label="TriboCRM Pipeline — zoom proximo passo com data">
  <rect width="700" height="580" rx="20" fill="#0f0f0f"/>
  <rect x="0" y="0" width="700" height="50" rx="20" fill="#161616"/>
  <rect x="0" y="30" width="700" height="20" fill="#161616"/>
  <circle cx="22" cy="25" r="6" fill="#2a2a2a"/>
  <circle cx="42" cy="25" r="6" fill="#2a2a2a"/>
  <circle cx="62" cy="25" r="6" fill="#2a2a2a"/>
  <text x="350" y="32" font-family="DM Sans, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="2">PIPELINE · PRÓXIMO PASSO COM DATA</text>

  <g transform="translate(60, 80)">
