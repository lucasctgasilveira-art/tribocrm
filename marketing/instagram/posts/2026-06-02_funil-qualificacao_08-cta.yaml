# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Parte 2 da série do funil em 4 partes: qualificação. É a etapa que quase ninguém faz direito, porque dá trabalho e parece que faz perder lead.

  A cena padrão em PME brasileira: trata todo lead como se fosse o último. Lead bom e lead ruim recebem o mesmo tempo, a mesma proposta, a mesma corrida. Aí o vendedor gasta a semana com quem nunca ia comprar e chega cansado em quem ia fechar.

  Tem dono que evita qualificar com medo de espantar cliente. Mas perguntar não espanta quem quer comprar. Espanta só quem ia te enrolar três semanas pra no fim dizer "vou pensar".

  Três coisas pra qualificar sem complicar:

  1. Pergunta o impacto, não o orçamento. Em vez de "qual seu orçamento?", "o que acontece se isso continuar do jeito que tá?". Quem sente a dor responde rápido. Quem tá só pesquisando, enrola.

  2. Descobre cedo quem assina. Vendedor fecha na cabeça com quem atendeu o telefone e descobre tarde que decide outro. Uma pergunta resolve: "além de você, quem mais participa dessa decisão?".

  3. Lead ruim merece um "boa sorte". Segurar lead que não fecha não é educação, é pipeline entupido. Sem dor, sem grana ou sem pressa, libera o vendedor pra quem tem os três.

  Qualificar é proteger o tempo de quem vende. O lead que passa por aqui chega na proposta já meio vendido.

  A gente faz Máquina de Vendas pra PME brasileira parar de tratar todo lead igual e começar a colocar energia onde tem cliente.

  Salva. Amanhã a série faz uma pausa pra falar da dor que une tudo isso 🔥

