# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Pipeline lido é decisão tomada. Pipeline não lido é torcida.

  5 leituras pra fazer em 5 minutos — uma por dia ou tudo de uma vez na sexta:

  1. Quantos leads novos entraram esta semana? Pipeline sem sangue novo seca em duas semanas e o dono só percebe quando o mês fecha mal.

  2. Quantos têm próximo passo com data? "Vou voltar a falar" não é passo. Quarta às 14h é passo. Lead sem data não tá vivo — tá te esperando esquecer.

  3. Quem tá parado há mais de 15 dias? Lead frio em proposta é museu, não pipeline. Pipeline que ninguém poda vira coleção.

  4. Quanto tá em negociação avançada? Esse é o número que vai virar caixa no mês. O que tira o sono. O que ninguém olha com calma.

  5. O número da semana cabe na cabeça? Entrou X. Fechou Y. Vivo no funil Z. Três números, uma frase. Se não cabe assim, ninguém decide nada com ele.

  Sócio que lê o funil toda semana chega na segunda com plano. Sócio que não lê, chega na segunda apostando. A gente faz Máquina de Vendas pra PME brasileira parar de chegar na segunda apostando.

  Salva pra olhar o seu pipeline hoje 🔥

