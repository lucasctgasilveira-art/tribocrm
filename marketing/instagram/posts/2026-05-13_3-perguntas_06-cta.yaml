# Legenda oficial
caption: |
  Vendedor que aceita reunião com qualquer um trabalha dobrado e fecha metade.

  Qualificação não é interrogatório. São 3 perguntas que cabem em qualquer conversa e devolvem em 10 minutos uma informação que normalmente levaria 3 reuniões pra aparecer.

  1. Quem mais decide com você? — pra achar o decisor real antes da quinta troca de email.
  2. Quanto custa não resolver isso até [mês concreto]? — pra qualificar a dor em R$, não em adjetivo.
  3. Quando precisa estar rodando? — pra separar urgência real de "logo a gente vê isso".

  Se as três respostas vierem firmes, é cliente. Se vierem travadas, é treino — e treino a gente faz com lead barato, não com a melhor pessoa da equipe gastando uma manhã.

  A gente faz Máquina de Vendas pra PME brasileira sair do achismo e começar a qualificar com método. Salva esse carrossel, manda pro time, roda na próxima reunião.

