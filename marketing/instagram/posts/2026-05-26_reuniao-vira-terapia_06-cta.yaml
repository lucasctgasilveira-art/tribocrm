# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Tem uma cena que se repete em PME brasileira toda segunda de manhã. Você abre a reunião comercial perguntando "como tá o pipeline?". O vendedor responde "tô correndo atrás". Você repete a pergunta mais específica. Vem outra frase genérica. Vinte minutos depois ninguém sabe nenhum número, e a reunião virou sessão de terapia.

  Não é má vontade do vendedor. "Tô correndo atrás" é a tradução honesta de "não sei em qual etapa cada lead tá". Sem método, a cabeça dele só guarda o lead mais barulhento da semana — o resto vira saudade.

  O custo dessa reunião sem número é alto. Você sai sem saber quanto vai fechar no mês. O vendedor sai sem saber qual lead atacar primeiro. A semana inteira anda no escuro porque a reunião de segunda não iluminou nada.

  A virada cabe numa pergunta. No lugar de "como tá o pipeline?", "cadê a próxima ação de cada lead que entrou?". Pergunta específica obriga resposta específica. Em 5 minutos a reunião vira sobre número, não mais sobre sentimento.

  A gente faz Máquina de Vendas pra PME brasileira parar de gastar segunda de manhã em reunião que ninguém sai com clareza.

  Salva pra usar na próxima reunião de segunda 🔥

