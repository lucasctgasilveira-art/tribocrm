# Legenda final (literal pro Instagram) — aprovada Brand Chief 28/04
caption: |
  1 pergunta que muda a reunião comercial. E que quase ninguém faz.

  A maioria das reuniões B2B em PME brasileira é monólogo. O vendedor explica o produto, mostra slide, joga detalhe técnico, pergunta "faz sentido?" — e o cliente educadamente diz que sim.

  Aí vem o follow-up. E o negócio trava. Porque ninguém sabe, de verdade, o que tá faltando pra fechar.

  A pergunta que muda tudo é simples:

  "O que precisa acontecer aí dentro pra vocês fecharem isso?"

  Não é pergunta de pitch. É pergunta de mapa. Ela força o cliente a verbalizar o processo interno dele — quem precisa aprovar, qual prazo, o que tá travando, quem ainda não foi consultado.

  A resposta é teu roteiro de cobrança pras próximas duas semanas.

  Sem essa pergunta, vendedor sai da reunião com sensação boa e zero informação. Com ela, sai com o próximo passo já desenhado pelo próprio cliente.

  Salva esse carrossel e manda pra equipe comercial 🔥 — vira regra de reunião na próxima segunda.

  A gente construiu o TriboCRM pra cobrar o vendedor a fazer essa pergunta (e registrar a resposta) toda vez. Link na bio quando quiser ver.

  Máquina de Vendas brasileira, com método embutido.

