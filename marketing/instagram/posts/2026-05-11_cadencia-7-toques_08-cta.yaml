# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  A maior parte das PMEs perde cliente por silêncio, não por preço.

  Vendedor faz a primeira ligação animado, manda um WhatsApp, e depois espera. Espera o cliente "dar um sinal". Sinal nunca vem. Quando o vendedor lembra de voltar, tem 3 semanas que cliente ouviu o concorrente, decidiu, fechou.

  Cadência de 7 toques é o que separa follow-up de perseguição. Não é roteiro engessado — é ritmo. Mesmo dia, D+2, D+5, D+10, D+18, D+30, D+45. Cada toque com objetivo diferente: presença, valor, prova, decisão, respeito.

  A gente não inventou isso. A gente só cansou de ver PME boa perdendo venda por não ter sistema que cobrasse o vendedor pra fazer o próximo toque.

  Salva esse carrossel. Manda pra equipe comercial. Roda essa cadência na próxima semana e me conta no DM o que mudou.

