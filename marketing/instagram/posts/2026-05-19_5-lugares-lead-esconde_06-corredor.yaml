# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Lead esquecido não some. Fica vivo nos 5 cantos onde sua PME não olha.

  1. Mensagem não lida no WhatsApp pessoal do vendedor. Cliente mandou às 19h de quarta, vendedor viu deitado no sofá, "respondo amanhã cedo" que nunca chegou.

  2. E-mail marcado como "depois respondo" há 11 dias. Estrelinha amarela, bandeirinha, marcador — sistema que mora no cliente de e-mail não é sistema, é lembrete pessoal que o gerente nunca vai conseguir cobrar.

  3. Post-it amarelo grudado no monitor da semana retrasada. "Ligar pro João da metalúrgica." Tá lá há 9 dias. Virou paisagem. Vendedor olha 30 vezes por dia e não vê.

  4. Aba 7 da planilha "controle_comercial_FINAL_v3". Linha 142, fonte 9, coluna "observações". Foi pra lá porque "ia voltar nisso depois". Não voltou.

  5. Conversa em pé no corredor: "lembra daquele cara?". Vendedor cruza com o sócio indo pro café. Quatro frases. Nenhuma anotação. Daqui dois dias nenhum dos dois lembra direito.

  Pipeline de PME não morre de uma vez. Morre vazando lead bom em 5 cantos diferentes, devagar, até o mês fechar mal e ninguém entender por quê.

  Marca o vendedor que vive isso.

  #vendasb2b #pmebrasileira #gestaocomercial #pipeline #processocomercial
