# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Tem um tipo de reunião comercial que faz todo mundo se sentir melhor e não muda nada no número. A gente chama de terapia.

  Três sinais de que a sua virou terapia:

  1. Todo mundo fala, ninguém mostra. A reunião é só relato — "tô correndo atrás", "o cliente sumiu", "a semana foi corrida". Ninguém abre o pipeline na tela. Quando a conversa é sobre sensação e não sobre lead, virou desabafo.

  2. Sai reunião, não sai decisão. Uma hora e meia depois, ninguém levanta com tarefa nova anotada. O mesmo lead parado vai reaparecer igual na semana que vem.

  3. O dono sai mais cansado do que entrou. Ouviu muita história, não saiu com clareza nenhuma de quanto vai fechar no mês.

  Acolher o time é importante. Mas reunião comercial é pra decidir: qual lead andou, qual travou, qual morreu, qual é a próxima ação de cada um. O resto é conversa de corredor com cadeira mais confortável.

  A gente faz Máquina de Vendas pra PME brasileira trocar a reunião que vira desabafo por reunião que vira decisão.

  Marca o gestor que sai de toda reunião comercial sem saber o que vai fechar 🔥

