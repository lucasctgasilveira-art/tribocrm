# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Sexta de tarde. O time trabalhou a semana inteira e a sensação é a mesma de sempre: correu muito, fechou o quê? Ninguém sabe ao certo se a semana rendeu. Aí segunda começa do zero, sem saber o que avançou e o que travou.

  O review longo de fim de semana ninguém faz — vira "deixa pra segunda" e segunda nunca chega. Mas um ritual de 15 minutos na sexta fecha a semana com clareza.

  O roteiro:

  1. Conta o que entrou e o que saiu do pipeline. Quantos leads novos chegaram, quantos viraram cliente, quantos viraram "não". É o placar da semana em três números.

  2. Olha os leads parados há mais de X dias. Filtra quem não anda há uma semana e decide: cutuca de novo ou tira do pipeline? Lead parado é dinheiro esquecido na gaveta.

  3. Confere o que prometeu pro cliente e não cumpriu. Aquele "te mando até quinta" que ficou pelo caminho. Promessa que vence no silêncio derruba venda.

  4. Define as 3 prioridades de segunda. Quais os três leads que merecem a primeira hora da semana que vem? Sai da sexta com a segunda já decidida.

  A gente faz Máquina de Vendas pra PME brasileira parar de terminar a semana no escuro e começar a próxima sabendo o que importa.

