# Legenda final oficial
caption: |
  "A gente" não é descuido. É escolha.

  CRM grande fala "nós oferecemos a melhor solução do mercado". A gente não fala assim porque PME brasileira não fala assim. Vendedor de PME fala "a gente vai resolver", "a gente combina semana que vem", "a gente vê isso na reunião".

  Quando a marca fala diferente do cliente, vira distância. Distância vira "isso aqui não é pra mim".

  A gente quer o oposto. Quer que dono de PME abra o Instagram, leia uma frase e pense "esse povo fala como eu".

  Não é casual demais. É preciso. Cada palavra que entra aqui passa por essa régua: PME brasileira diria isso?

  Se não diria, refaz.

  #vendasb2b #pmebrasileira #marcabrasileira #vozdamarca #crmbrasileiro
