# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Parte 3 da série do funil em 4 partes: proposta. A etapa onde mais venda boa morre de silêncio.

  Você conhece a cena: caprichou no PDF, mandou no e-mail, e agora espera. Passa um dia, passa uma semana. Sem saber se o lead leu, se gostou, ou se já fechou com outro. Proposta enviada virou vácuo.

  Quase sempre a proposta sumiu porque foi enviada cedo demais. Mandar valor no primeiro "me manda um preço" é entregar número antes de construir desejo. Sem a dor confirmada, a proposta vira só um número solto — e número solto é fácil de ignorar.

  Três coisas que tiram a proposta do limbo:

  1. Nunca manda proposta, apresenta. Marca 15 minutos pra mostrar com o lead na linha. Você ouve a reação na hora, responde a dúvida na hora, e a proposta não vira um PDF órfão na caixa de entrada.

  2. A proposta fala da dor dele, não do teu produto. Lead não compra item de lista, compra o problema dele resolvido. Abre lembrando o que ele te contou que doía. Aí o preço aparece como a saída do problema, não como gasto.

  3. Nenhuma proposta sai sem data de resposta. "Te procuro depois" mata mais venda que preço alto. Antes de encerrar, combina o retorno e marca a data no sistema: "te ligo quinta às 10h pra fechar". A tela cobra você do limbo.

  Proposta é conversa, não anexo. O lead que chega aqui já entendeu o valor e já tem hora pra responder.

  A gente faz Máquina de Vendas pra PME brasileira parar de mandar proposta no escuro e começar a fechar com data marcada.

  Salva. Amanhã fecha a série com a parte 4: o fechamento 🔥

