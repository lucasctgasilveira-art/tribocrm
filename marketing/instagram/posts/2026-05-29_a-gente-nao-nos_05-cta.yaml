# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Por que a gente fala "a gente" e não "nós" no TriboCRM.

  Não é descuido. É escolha. Toda peça que sai da gente é revisada pra trocar "nós" por "a gente". Tem regra de marca pra isso — não é menos formal, é mais perto da boca de quem vai ler.

  Quem fala "nós" no Brasil? Manual de empresa. Slide de governo. E-mail jurídico. Vendedor de PME brasileira não fala "nós entregamos" pro cliente — fala "a gente entrega". Quem fala "nós" tá performando, e PME percebe na primeira frase.

  Palavra escolhida vira confiança. "A gente" diz que tem gente de verdade do outro lado, não uma multinacional se passando por brasileira. Pra PME que já levou cano de software gringo traduzido às pressas, isso é o primeiro sinal de que a empresa é o que diz que é.

  Não é detalhe. Voz é parte do produto. Software pra PME brasileira tem que falar como PME brasileira fala — em reunião, em WhatsApp, em conversa de domingo no almoço da família.

  Repara nas próximas peças da gente. Toda escolha de palavra tem critério aqui 🔥

