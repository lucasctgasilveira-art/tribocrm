# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Toda sexta às 17h tem dois tipos de PME no Brasil. A que sabe quanto fechou na semana e o que tá vivo pra próxima. E a que descobre isso na segunda, depois do café, com cara de quem dormiu mal.

  A diferença entre as duas não é tamanho, nem time, nem sorte. São 30 minutos.

  O ritual:

  1. Olha o que entrou na semana (5 min). Quantos leads novos, de onde vieram. Pipeline sem sangue novo seca em duas semanas.

  2. Próximo passo com data, em tudo que tá em proposta (10 min). Não "vou voltar a falar". Quarta às 14h. Lead sem data não tá vivo — tá te esperando esquecer.

  3. Mata ou move quem tá parado há mais de 15 dias (8 min). Lead frio não fica em proposta. Pipeline que ninguém poda vira museu.

  4. Fecha o número da semana (5 min). Quanto fechou, quanto entrou, quanto morreu.

  5. Manda 3 linhas pro sócio (2 min). "Fechei X. Entraram Y. Tô apostando em Z pra próxima semana." Domingo ele acorda sabendo. Segunda começa com plano.

  Pipeline limpo não é talento. É hábito de 30 minutos. A gente faz Máquina de Vendas pra PME brasileira parar de chegar na segunda apostando.

  Salva pra rodar essa sexta às 17h 🔥

