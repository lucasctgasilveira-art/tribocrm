caption: |
  Sexta, 18h. O time fecha o notebook. O sócio chega segunda perguntando "quanto a gente fechou na semana?" — e a resposta vem do achismo, não do pipeline.

  É a cena mais comum em PME brasileira. Não é falta de vontade. É falta de método.

  Três números resolvem: quanto entrou de lead novo, quanto saiu (ganho ou perdido) e quanto ficou em pé com próximo passo combinado.

  Roda toda sexta. 30 minutos. Vira ritual em 2 semanas.

