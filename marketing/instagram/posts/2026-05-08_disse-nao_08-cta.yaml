# Legenda final oficial
caption: |
  Toda semana chega pedido novo de função no produto. A gente diz não pra muita coisa. Não por preguiça — por escolha.

  3 que parecem óbvias e a gente recusou de propósito:

  1. WhatsApp Business API oficial. Cada PME usa WhatsApp do jeito dela. Plugar a API mata o que já funciona e ainda cobra por sessão.

  2. Relatório com IA preditiva. Tá na moda. PME não precisa de IA, precisa do número certo na hora certa. IA preditiva sem base é chute com gráfico bonito.

  3. App nativo iOS/Android. Todo cliente pede no primeiro mês. O sistema já abre no celular pelo navegador, mobile-first. 6 meses de engenharia pra ganhar 5% de uso real — esse tempo vira pipeline mais rápido.

  A régua que a gente usa: "isso resolve o que tá doendo ou só fica bonito no print da call de venda?" Se é bonito, entra na lista do não.

  CRM brasileiro virou enxoval. 800 funções, 12 que o cliente usa. A gente faz a Máquina de Vendas — cabe num jeito de trabalhar.

  Comenta aí: que função todo CRM tem que tu nunca usou? 🔥

