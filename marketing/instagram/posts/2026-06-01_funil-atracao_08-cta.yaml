# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Começa hoje uma série de 4 partes sobre o funil da sua PME — uma etapa por dia. Parte 1: atração.

  Tem uma confusão comum em PME brasileira que tá tentando crescer: achar que atração é juntar gente. WhatsApp lotado, vendedor ocupado o dia inteiro, e no fim do mês quase ninguém daquele monte virou cliente. Atração de verdade não é juntar gente. É juntar gente certa.

  Três coisas que arrumam a primeira etapa do funil:

  1. Anota de onde cada lead veio. Indicação, anúncio, Instagram, feira, site — cada um entra no sistema com a origem marcada. Trinta dias disso e a tela mostra qual canal vira cliente e qual só traz curioso. Aí a gente para de gastar energia igual nos dois.

  2. Responde rápido. Lead quente esfria em horas. Quem fala primeiro larga na frente. Não precisa ser script bonito, precisa ser rápido e já ter a próxima pergunta pronta.

  3. Separa contato de oportunidade. Contato é alguém que apareceu. Oportunidade é quem tem dor, grana e pressa. Misturar os dois no mesmo balde faz o vendedor correr atrás de quem nunca ia comprar e esquecer quem ia.

  Atração boa não é volume. É começo de funil que dá pra seguir. Com origem marcada, resposta rápida e contato separado de oportunidade, a próxima etapa recebe lead organizado em vez de bagunça.

  A gente faz Máquina de Vendas pra PME brasileira parar de medir atração por número e começar a medir por cliente.

  Salva. Amanhã vem a parte 2: qualificação 🔥

