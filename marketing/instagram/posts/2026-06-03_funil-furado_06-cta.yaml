# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  No meio da série do funil em 4 partes, uma pausa pra falar da dor que une tudo.

  Tem dono de PME que reclama que o funil tá lento. Quase sempre não é lento. Tá furado.

  A cena: entra muito lead, fecha pouco cliente. O topo do funil cheio, a base vazia. Você olha o WhatsApp lotado e pensa que falta gente. Não falta gente. Falta o lead chegar inteiro até o fim.

  O lead não some sozinho. Ele cai num buraco. Buraco da atração sem origem marcada. Buraco da qualificação que ninguém faz. Buraco da proposta que some na caixa de entrada. Buraco do fechamento sem próxima data. Cada buraco escorre venda sem você ver.

  E o custo é traiçoeiro: funil furado faz você gastar mais pra vender o mesmo. Bota mais anúncio, mais lead, mais corrida, e o número final quase não mexe. Porque o problema não é a entrada, é o vazamento no meio. Encher o topo de um balde furado só molha o chão.

  A virada: antes de buscar mais lead, acha o furo. Olha cada etapa e pergunta quantos entraram aqui e quantos passaram pra frente. A etapa que mais segura lead é o teu furo. Tapa esse primeiro. Aí sim vale a pena encher o topo de novo.

  A gente faz Máquina de Vendas pra PME brasileira parar de gastar com mais lead e começar a tapar o furo que come o que já entra.

  Salva e olha teu funil com esse olho hoje 🔥

