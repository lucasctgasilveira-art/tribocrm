# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Fim do mês, e todo mundo descobre o número junto. Vira o mês, sai o resultado, e aí é tarde demais pra reagir — o mês já era. O número aparece como surpresa, não como consequência.

  Aí a reunião mensal vira retrospectiva de desculpa: cada um explica por que não bateu, o dono cobra, e ninguém olha o dado pra ajustar a rota. Calibragem vira justificativa.

  Dá pra fazer diferente em 90 minutos, com dado na mesa em vez de sensação. Quatro blocos:

  1. Previsão x real: onde a previsão errou e por quê. Compara o que o pipeline previa com o que fechou. A diferença não é pra culpar, é pra entender onde o time se ilude.

  2. Taxa de conversão por etapa do funil. Quanto avança de uma etapa pra outra? O gargalo aparece com nome e número — e mostra onde a venda vaza.

  3. De onde vieram os clientes que fecharam. Indicação, anúncio, prospecção? Saber qual canal traz cliente de verdade separa investir com método de gastar no escuro.

  4. Metas e prioridades do próximo mês. Com o mês fechado na mão, define a meta e as poucas prioridades que vão puxar o número. Meta sem prioridade é só desejo.

  A gente faz Máquina de Vendas pra PME brasileira parar de descobrir o número no fim e começar a calibrar a rota com dado.

  Salva pra rodar a próxima mensal com dado na mesa 🔥

