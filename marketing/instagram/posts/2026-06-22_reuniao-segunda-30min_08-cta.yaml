# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Segunda de manhã, reunião comercial. Uma hora e meia depois, todo mundo correu atrás de cada história e ninguém sabe o que vai fechar na semana. "Tô correndo atrás", "o cliente sumiu", "a semana foi corrida". Saiu reunião, não saiu decisão.

  Dá pra fazer em 30 minutos se o pipeline conduzir, não a memória do time.

  O roteiro:

  1. Abre pelo pipeline, não pelas histórias (5 min). A tela do funil fica na frente de todo mundo. É ela que comanda a reunião. Quem fala olha pro lead, não pro teto.

  2. Vai etapa por etapa, lead por lead (15 min). Pra cada lead, uma pergunta só: qual a próxima ação e pra quando? Lead sem próxima ação e sem data não passa. É aqui que mora a reunião de verdade.

  3. Decide o que morre (5 min). Lead parado há semanas vira "perdido" ou ganha uma ação real agora. Pipeline cheio de lead morto engana o time inteiro.

  4. Sai com a próxima ação de cada um anotada (5 min). Ninguém levanta sem tarefa com data dentro do sistema. O que fica no "depois eu vejo" nunca acontece.

  A gente faz Máquina de Vendas pra PME brasileira trocar reunião que vira desabafo por reunião que vira semana que rende.

  Salva pra rodar na próxima segunda com o time 🔥

