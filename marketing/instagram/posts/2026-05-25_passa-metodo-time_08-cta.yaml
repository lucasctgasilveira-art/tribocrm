# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Tem uma cena que se repete em PME brasileira que tá tentando crescer. Dono junta o time num sábado, traz consultor, paga café, entrega apostila. Todo mundo concorda na sala. Na segunda, cada vendedor faz do jeito antigo.

  Não é resistência. É que método não se aprende em palestra. Se aprende fazendo.

  Quatro passos pra passar o método sem virar treinamento chato:

  1. Leva o vendedor numa venda sua. Antes de qualquer slide, ele vê a pergunta que você faz, a ordem, o jeito que anota. Vinte minutos disso ensinam mais que duas horas de sala.

  2. Escreve o método em 1 página. Não é manual. Não é apostila. Uma página com as etapas do funil, a pergunta-chave de cada uma, o que precisa estar anotado pra avançar. Cabe num post-it grande na mesa.

  3. Treina no pipeline real do vendedor. Senta junto, abre os leads que ele tem hoje, aplica o método lead por lead. Caso fictício vira piada. Caso real vira hábito.

  4. Cobra na reunião de segunda. "Cadê a próxima ação de cada lead?" no lugar de "como foi a semana?". Sem cobrança no ritual, o treinamento de sábado morre na quarta.

  Método não é evento. É ritmo. A gente faz Máquina de Vendas pra PME brasileira parar de gastar sábado em treinamento que não pega.

  Salva pra rodar na próxima reunião com o time 🔥

