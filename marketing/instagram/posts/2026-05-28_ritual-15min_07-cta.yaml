# Legenda oficial (texto literal que vai pro Instagram)
caption: |
  Tem semana que a equipe comercial trava. O vendedor abre o pipeline, olha por 5 minutos, não sabe qual lead atacar primeiro. Acaba mexendo no mais fácil e deixando o mais importante pra "depois". Reunião semanal não resolve — a semana é longa demais pra travar de segunda a sexta.

  Tem um ritual de 15 minutos que destrava. A gente chama de daily comercial, mas pode chamar como quiser. O que importa são 3 regras:

  1. Mesmo horário, todo dia. 9h da manhã. 15 minutos. Em pé. Não muda, não cancela, não vira reunião de 1h. Horário fixo cria hábito — e hábito é o que segura método quando o dia aperta.

  2. Cada vendedor responde 3 coisas. O que fechei ontem. O que vou atacar hoje. Onde tô travado. São as 3 que importam. Travado vira pauta na hora — o time todo ajuda em 2 minutos o que sozinho ia levar a semana.

  3. Pipeline aberto na tela. Não vale memória. A tela mostra o lead, o vendedor mostra a próxima ação. Sem pipeline aberto vira reunião de impressão — com pipeline aberto, lead esquecido aparece na hora.

  Duas semanas rodando e a equipe destrava. Vendedor para de perguntar "por onde começo?" — começa pela próxima ação que ele mesmo escreveu no dia anterior. O dono para de ser babá de pipeline.

  A gente faz Máquina de Vendas pra PME brasileira ter ritual de equipe, não dependência de gerente.

