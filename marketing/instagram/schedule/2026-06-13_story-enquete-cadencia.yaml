# status=manual (NÃO "aprovado") de propósito: o publisher só dispara status=aprovado
# (publish.mjs L279). Como a enquete usa sticker NATIVO do IG — não suportado pelo
# Graph API — ela PRECISA ficar fora do auto-publisher. "manual" garante o skip sem
# perder o registro do slot. A peça está aprovada pelo Lucas; só a publicação é manual.
status: manual
slot:
  data: '2026-06-13'
  horario: '10:32 BRT'
  justificativa: >
    Sábado 10:32 BRT — story 2 de 2 do encerramento da Semana 6 (Série "Cadência"). Enquete nativa
    "Qual parte da cadência mais te escapa?" (o primeiro toque / voltar no lead frio). Sequência de
    ~2 min depois do recap. Amarra a série numa pergunta de autodiagnóstico e abre porta pra DM
    qualificada. Horário replicado das semanas anteriores (stories de sábado a partir de 10:30).
formato: story
nota_status: |
  status=aprovado, MAS a publicação é MANUAL: a enquete usa o sticker NATIVO "Enquete" do
  Instagram, que NÃO é suportado pelo Graph API. O publisher pula esta peça automaticamente
  (metodo=manual). O Lucas sobe o story no app e adiciona o sticker por cima do PNG.
arquivos:
  - output/2026-06-13_story-enquete-cadencia.png
caption_source: null
publicacao:
  metodo: manual_lucas_app_instagram
  acao_humana_necessaria: lucas_sobe_story_no_app_e_adiciona_sticker_enquete
instrucao_enquete: |
  Workflow manual no app do Instagram:
  1. Subir o PNG (output/2026-06-13_story-enquete-cadencia.png) como story.
  2. Adicionar sticker "Enquete" do IG por cima.
  3. Texto sticker: "Qual parte da cadência mais te escapa?"
     — opção A: "O primeiro toque" / opção B: "Voltar no lead frio".
  4. Habilitar respostas DM ("Manda DM se quiser montar a tua").
  5. Salvar respostas pra alimentar a planilha de KPI da semana (engajamento story = +1 sinal;
     resultado A/B vira insumo pra calibrar a próxima série).
tema_visual: dark
observacao: >
  Story 2 de 2 do encerramento da Semana 6. Enquete nativa — manual porque o Graph API não suporta
  sticker enquete. Aprovado pelo Lucas (decisão: fecha a semana em recap + enquete, sem peça
  opcional). O publisher pula automaticamente (metodo=manual); só o recap sai via cron.
